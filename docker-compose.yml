services:
  applica:
    build: .
    container_name: applica
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - applica-data:/data
    environment:
      - DATA_DIR=${DATA_DIR:-/data}
      - PORT=${PORT:-8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  applica-data:
